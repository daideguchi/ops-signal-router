<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ops Signal Router architecture diagram</title>
  <desc id="desc">Slack app architecture from incoming operational signals to AI routing core, Slack action cards, and human operator decisions.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 46px Arial, Helvetica, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 400 23px Arial, Helvetica, sans-serif; fill: #475569; letter-spacing: 0; }
      .label { font: 700 25px Arial, Helvetica, sans-serif; fill: #111827; letter-spacing: 0; }
      .small { font: 400 19px Arial, Helvetica, sans-serif; fill: #334155; letter-spacing: 0; }
      .tiny { font: 400 16px Arial, Helvetica, sans-serif; fill: #475569; letter-spacing: 0; }
      .pill { font: 700 16px Arial, Helvetica, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #dbe4ee; stroke-width: 2; rx: 8; filter: url(#shadow); }
      .input { fill: #ecfeff; stroke: #67e8f9; }
      .slack { fill: #f4f0ff; stroke: #b69cff; }
      .agent { fill: #fff7ed; stroke: #fdba74; }
      .core { fill: #eefdf5; stroke: #86efac; }
      .output { fill: #fefce8; stroke: #fde047; }
      .human { fill: #fff1f2; stroke: #fda4af; }
      .safety { fill: #f1f5f9; stroke: #cbd5e1; }
      .line { fill: none; stroke: #475569; stroke-width: 4; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #94a3b8; stroke-width: 3; marker-end: url(#arrow); }
      .tag { fill: #e2e8f0; rx: 16; }
      .tagGreen { fill: #bbf7d0; rx: 16; }
      .tagAmber { fill: #fde68a; rx: 16; }
      .tagRed { fill: #fecdd3; rx: 16; }
      .mono { font: 700 17px Menlo, Consolas, monospace; fill: #0f172a; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="72" y="76">Ops Signal Router</text>
  <text class="subtitle" x="72" y="115">Slack-native agent that turns scattered ops messages into auditable action cards before deadlines slip.</text>

  <g transform="translate(72 165)">
    <rect class="card input" width="250" height="270"/>
    <text class="label" x="26" y="44">1. Inputs</text>
    <text class="small" x="26" y="84">Slack mentions / DMs</text>
    <text class="small" x="26" y="118">Devpost excerpts</text>
    <text class="small" x="26" y="152">Gmail summaries</text>
    <text class="small" x="26" y="186">Receipts / evaluations</text>
    <rect class="tag" x="24" y="218" width="188" height="34"/>
    <text class="pill" x="42" y="241">redacted or synthetic</text>
  </g>

  <g transform="translate(398 165)">
    <rect class="card slack" width="275" height="270"/>
    <text class="label" x="26" y="44">2. Slack App</text>
    <text class="small" x="26" y="84">Bolt event listeners</text>
    <text class="small" x="26" y="118">assistant_view entrypoint</text>
    <text class="small" x="26" y="152">Socket Mode sandbox</text>
    <text class="small" x="26" y="186">App Home + threads</text>
    <rect class="tag" x="24" y="218" width="163" height="34"/>
    <text class="pill" x="42" y="241">Slack Agent UI</text>
  </g>

  <g transform="translate(755 165)">
    <rect class="card agent" width="300" height="270"/>
    <text class="label" x="26" y="44">3. Agent Layer</text>
    <text class="small" x="26" y="84">OpenAI Agents SDK</text>
    <text class="small" x="26" y="118">route_ops_signal tool</text>
    <text class="small" x="26" y="152">Slack MCP when token exists</text>
    <text class="small" x="26" y="186">Local fallback for demos</text>
    <rect class="tagAmber" x="24" y="218" width="195" height="34"/>
    <text class="pill" x="42" y="241">MCP-enabled path</text>
  </g>

  <g transform="translate(1138 165)">
    <rect class="card core" width="330" height="270"/>
    <text class="label" x="26" y="44">4. Routing Core</text>
    <text class="small" x="26" y="84">Classify operational tier</text>
    <text class="small" x="26" y="118">Extract deadline</text>
    <text class="small" x="26" y="152">Detect stoplines</text>
    <text class="small" x="26" y="186">Score + reason trail</text>
    <rect class="tagGreen" x="24" y="218" width="260" height="34"/>
    <text class="mono" x="42" y="241">ACT_NOW / WATCH / STOPLINE</text>
  </g>

  <path class="line" d="M 322 300 H 386"/>
  <path class="line" d="M 673 300 H 743"/>
  <path class="line" d="M 1055 300 H 1126"/>

  <g transform="translate(398 545)">
    <rect class="card output" width="325" height="215"/>
    <text class="label" x="26" y="44">5. Slack Action Card</text>
    <text class="small" x="26" y="84">Tier headline</text>
    <text class="small" x="26" y="118">Deadline + next action</text>
    <text class="small" x="26" y="152">Audit reason trail</text>
    <rect class="tag" x="24" y="174" width="196" height="34"/>
    <text class="pill" x="42" y="197">posted in thread</text>
  </g>

  <g transform="translate(815 545)">
    <rect class="card human" width="325" height="215"/>
    <text class="label" x="26" y="44">6. Human Operator</text>
    <text class="small" x="26" y="84">Act now</text>
    <text class="small" x="26" y="118">Keep watch / waiting</text>
    <text class="small" x="26" y="152">Stop for approval</text>
    <rect class="tagRed" x="24" y="174" width="231" height="34"/>
    <text class="pill" x="42" y="197">no automatic external send</text>
  </g>

  <path class="line" d="M 1303 435 C 1303 510 690 474 610 537"/>
  <path class="line" d="M 723 652 H 803"/>

  <g transform="translate(72 545)">
    <rect class="card safety" width="250" height="215"/>
    <text class="label" x="26" y="44">Safety Boundary</text>
    <text class="small" x="26" y="84">No secrets in repo</text>
    <text class="small" x="26" y="118">Synthetic public demo</text>
    <text class="small" x="26" y="152">STOPLINE for risk</text>
    <rect class="tag" x="24" y="174" width="179" height="34"/>
    <text class="pill" x="42" y="197">audit-first design</text>
  </g>

  <path class="thin" d="M 322 653 H 386"/>

  <g transform="translate(1168 560)">
    <rect x="0" y="0" width="300" height="178" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text class="label" x="24" y="40">Live Proof</text>
    <text class="small" x="24" y="78">Sandbox app installed</text>
    <text class="small" x="24" y="112">Reviewer invites sent</text>
    <text class="small" x="24" y="146">Action card screenshot captured</text>
  </g>

  <text class="tiny" x="72" y="848">Submission asset: architecture-diagram.png | Source: architecture-diagram.svg | Public demo uses synthetic or redacted signals.</text>
</svg>
